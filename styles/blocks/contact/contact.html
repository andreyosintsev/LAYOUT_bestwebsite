<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            Contact
        </title>
        <link rel="stylesheet" href="../../fonts.css">
        <link rel="stylesheet" href="../../consts.css">
        <link rel="stylesheet" href="../../base.css">
        <link rel="stylesheet" href="../button/button.css">
        <link rel="stylesheet" href="../socials/socials.css">
        <link rel="stylesheet" href="../surface/surface.css">
        <link rel="stylesheet" href="../section/section.css">
        <link rel="stylesheet" href="contact.css">
        <link rel="stylesheet" href="../../responsive.css">
    </head>
    <body class="page">
        <main class="container">
            <section class="contact panel" id="contacts">
                <div class="contact__info">
                    <span class="section__label">
                        Контакты
                    </span>
                    <h2 class="section__title">
                        Свяжитесь со мной
                    </h2>
                    <p>
                        ✉ hello@alexeypetrov.dev
                    </p>
                    <p>
                        ⌕ +7 (999) 123-45-67
                    </p>
                    <p>
                        ⌖ Москва, Россия
                    </p>
                    <div class="socials">
                        <a class="socials__link" href="#">
                            GH
                        </a>
                        <a class="socials__link" href="#">
                            ➤
                        </a>
                        <a class="socials__link" href="#">
                            in
                        </a>
                    </div>
                </div>
                <form class="form">
                    <div class="form__row">
                        <input class="form__input" name="name" placeholder="Имя" required>
                        <input class="form__input" type="email" name="email" placeholder="Email" required>
                    </div>
                    <textarea class="form__input form__textarea" name="message" placeholder="Сообщение" required>
                    </textarea>
                    <button class="button button--small" type="submit">
                        Отправить сообщение
                    </button>
                </form>
                <div class="map">
                    <span class="map__pin">
                        ●
                    </span>
                    <div>
                        <b>
                            Москва, ул. Примерная, 25
                        </b>
                        <small>
                            Буду рад обсудить ваш проект!
                        </small>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
